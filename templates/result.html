<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dataset Preview | ExplainX AI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="hero-card">

        <h1>Dataset Preview</h1>

        <p class="subtitle">

            Verify your dataset before training the model.

        </p>

    </div>

    <div class="stats-grid">

        <div class="stat-card">

            <h3>Total Rows</h3>

            <h2>{{ rows }}</h2>

        </div>

        <div class="stat-card">

            <h3>Total Columns</h3>

            <h2>{{ cols }}</h2>

        </div>

        <div class="stat-card">

            <h3>Missing Values</h3>

            <h2>{{ missing }}</h2>

        </div>

    </div>

    <div class="card">

        <h2>First 10 Rows</h2>

        <div class="table-container">

            {{ preview|safe }}

        </div>

    </div>

    <div class="card">

        <h2>Select Target Column</h2>

        <form action="{{ url_for('train_model') }}"
              method="POST">

            <select
                name="target"
                class="select-box"
                required>

                <option value="">
                    -- Select Target Column --
                </option>

                {% for column in columns %}

                <option value="{{ column }}">

                    {{ column }}

                </option>

                {% endfor %}

            </select>

            <button
                type="submit"
                class="btn">

                Train Random Forest

            </button>

        </form>

    </div>

    <div style="text-align:center;margin-top:25px;">

        <a href="{{ url_for('home') }}"
           class="btn">

            Upload Another Dataset

        </a>

    </div>

</div>

</body>

</html>
